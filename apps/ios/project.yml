name: Nima
options:
  bundleIdPrefix: com.yamin.nimademo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

packages:
  Tun2SocksKit:
    # Keep exact pin aligned with UDP decoder framing assumptions.
    url: https://github.com/EbrahimTahernejad/Tun2SocksKit
    exactVersion: "5.14.4"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"

targets:
  Nima:
    type: application
    platform: iOS
    sources:
      - path: Nima
      - path: Shared
    dependencies:
      - package: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: RevenueCat
        product: RevenueCat
      - target: NimaTunnel
      - sdk: NetworkExtension.framework
    info:
      path: Nima/Info.plist
      properties:
        CFBundleDisplayName: Nima
        CFBundleName: Nima
        UIAppFonts:
          - SK Pupok Solid 400.ttf
          - Coolvetica Rg.otf
          - Coolvetica Rg It.otf
        UIViewControllerBasedStatusBarAppearance: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UILaunchStoryboardName: LaunchScreen
        UIBackgroundModes:
          - audio
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_KEY: $(SUPABASE_KEY)
        GOOGLE_IOS_CLIENT_ID: $(GOOGLE_IOS_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
          - CFBundleURLSchemes:
              - nima
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
    entitlements:
      path: Nima/chungus.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.yamin.nimademo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo
        INFOPLIST_FILE: Nima/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SSTZYP6ZWB
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES

  NimaTunnel:
    type: app-extension
    platform: iOS
    sources:
      - NimaTunnel
      - Shared/TimeWindowCore.swift
    dependencies:
      - package: Tun2SocksKit
      - sdk: NetworkExtension.framework
    info:
      path: NimaTunnel/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: NimaTunnel/chungusTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.yamin.nimademo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo.NimaTunnel
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SSTZYP6ZWB

  NimaTunnelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NimaTunnelTests
      - path: NimaTunnel/NimaConstants.swift
      - path: NimaTunnel/ReelsBlockFilter.swift
      - path: NimaTunnel/SOCKSProxyServer.swift
      - path: NimaTunnel/TrafficStats.swift
      - path: NimaTunnel/TunnelLogger.swift
      - path: NimaTunnel/UDPControlStreamDecoder.swift
      - path: Shared/TimeWindowCore.swift
    dependencies:
      - package: Tun2SocksKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo.NimaTunnelTests
        DEVELOPMENT_TEAM: SSTZYP6ZWB
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"

  NimaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NimaTests
    dependencies:
      - target: Nima
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo.NimaTests
        DEVELOPMENT_TEAM: SSTZYP6ZWB
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nima.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Nima"
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"

  TikTokVPNDropUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - TikTokVPNDropUITests
    dependencies:
      - target: Nima
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo.TikTokVPNDropUITests
        DEVELOPMENT_TEAM: SSTZYP6ZWB
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Nima

schemes:
  Nima:
    build:
      targets:
        Nima: all
        NimaTunnel: all
        NimaTests: [test]
        NimaTunnelTests: [test]
    test:
      targets:
        - NimaTests
        - NimaTunnelTests

  TikTokVPNDropUITests:
    build:
      targets:
        Nima: all
        TikTokVPNDropUITests: [test]
    test:
      targets:
        - TikTokVPNDropUITests

  NimaTunnel:
    build:
      targets:
        Nima: all
        NimaTunnel: all
        NimaTunnelTests: [test]
    test:
      targets:
        - NimaTunnelTests
