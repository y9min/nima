name: Bubble
options:
  bundleIdPrefix: com.yamin.nimademo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

configFiles:
  Debug: Secrets.xcconfig.example
  Release: Secrets.xcconfig.example

packages:
  Tun2SocksKit:
    # Keep exact pin aligned with UDP decoder framing assumptions.
    url: https://github.com/EbrahimTahernejad/Tun2SocksKit
    exactVersion: "5.14.4"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Bubble:
    type: application
    platform: iOS
    sources:
      - path: Bubble
    dependencies:
      - package: Supabase
      - target: BubbleTunnel
      - sdk: NetworkExtension.framework
    info:
      path: Bubble/Info.plist
      properties:
        CFBundleDisplayName: Nima
        CFBundleName: Nima
        UIAppFonts:
          - SK Pupok Solid 400.ttf
          - Coolvetica Rg.otf
          - Coolvetica Rg It.otf
        UIViewControllerBasedStatusBarAppearance: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UILaunchScreen: {}
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_KEY: $(SUPABASE_KEY)
    entitlements:
      path: Bubble/chungus.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.yamin.nimademo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo
        INFOPLIST_FILE: Bubble/Info.plist
        DEVELOPMENT_TEAM: KSW886X5UX
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES

  BubbleTunnel:
    type: app-extension
    platform: iOS
    sources:
      - BubbleTunnel
    dependencies:
      - package: Tun2SocksKit
      - sdk: NetworkExtension.framework
    info:
      path: BubbleTunnel/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: BubbleTunnel/chungusTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.yamin.nimademo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo.BubbleTunnel
        DEVELOPMENT_TEAM: KSW886X5UX

  BubbleTunnelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BubbleTunnelTests
      - path: BubbleTunnel/BubbleConstants.swift
      - path: BubbleTunnel/ReelsBlockFilter.swift
      - path: BubbleTunnel/SOCKSProxyServer.swift
      - path: BubbleTunnel/TrafficStats.swift
      - path: BubbleTunnel/TunnelLogger.swift
      - path: BubbleTunnel/UDPControlStreamDecoder.swift
    dependencies:
      - package: Tun2SocksKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo.BubbleTunnelTests
        DEVELOPMENT_TEAM: KSW886X5UX
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"

  TikTokVPNDropUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - TikTokVPNDropUITests
    dependencies:
      - target: Bubble
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yamin.nimademo.TikTokVPNDropUITests
        DEVELOPMENT_TEAM: KSW886X5UX
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Bubble

schemes:
  Bubble:
    build:
      targets:
        Bubble: all
        BubbleTunnel: all
        BubbleTunnelTests: [test]
    test:
      targets:
        - BubbleTunnelTests

  TikTokVPNDropUITests:
    build:
      targets:
        Bubble: all
        TikTokVPNDropUITests: [test]
    test:
      targets:
        - TikTokVPNDropUITests

  BubbleTunnel:
    build:
      targets:
        Bubble: all
        BubbleTunnel: all
        BubbleTunnelTests: [test]
    test:
      targets:
        - BubbleTunnelTests
